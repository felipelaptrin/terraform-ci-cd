name: Renovate

on:
  schedule:
    - cron: "0 19 * * 0"  # Every Sunday at 16:00 UTC-3 (19:00 UTC)
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - uses: renovatebot/github-action@v46.1.8
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_USERNAME: "renovate-bot-felipelaptrin[bot]"
          RENOVATE_GIT_AUTHOR: "renovate-bot-felipelaptrin[bot] <267464384+renovate-bot-felipelaptrin[bot]@users.noreply.github.com>"
