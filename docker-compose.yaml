services:
  floci:
    container_name: floci
    image: floci/floci:latest
    ports:
      - "4566:4566"
      - "6379-6399:6379-6399"  # ElastiCache proxy ports
      - "7001-7099:7001-7099"  # RDS proxy ports
    volumes:
      - ./floci-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock # Reference: https://floci.io/floci/configuration/docker-compose/
    environment:
      FLOCI_STORAGE_MODE: hybrid # In-memory reads, async flush to disk
